<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AliStore - التطبيقات المعدلة</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#f2f2f2;
}

header{
    background:#000;
    color:white;
    padding:15px;
    text-align:center;
    font-size:22px;
}

.container{
    padding:20px;
}

.section-title{
    font-size:20px;
    margin-bottom:15px;
}

.apps{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
    gap:15px;
}

.app{
    background:white;
    border-radius:10px;
    padding:15px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.app img{
    width:80px;
    height:80px;
    border-radius:20px;
}

.app h3{
    font-size:16px;
}

.download{
    background:#007aff;
    color:white;
    border:none;
    padding:8px 15px;
    border-radius:6px;
    cursor:pointer;
}

.download:hover{
    background:#0056cc;
}
</style>

</head>

<body>

<header>
AliStore - متجر التطبيقات المعدلة
</header>

<div class="container">

<div class="section-title">التطبيقات</div>

<div class="apps">

<div class="app">
<img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png">
<h3>Instagram ++</h3>
<button class="download">تحميل</button>
</div>

<div class="app">
<img src="https://upload.wikimedia.org/wikipedia/commons/7/75/YouTube_social_white_squircle_%282017%29.svg">
<h3>YouTube Premium</h3>
<button class="download">تحميل</button>
</div>

<div class="app">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/TikTok_Logo.png">
<h3>TikTok ++</h3>
<button class="download">تحميل</button>
</div>

</div>

<br>

<div class="section-title">الألعاب</div>

<div class="apps">

<div class="app">
<img src="https://upload.wikimedia.org/wikipedia/en/3/3d/PUBG_Mobile_logo.png">
<h3>PUBG Hack</h3>
<button class="download">تحميل</button>
</div>

<div class="app">
<img src="https://upload.wikimedia.org/wikipedia/en/thumb/0/0c/Clash_of_Clans_logo.png/220px-Clash_of_Clans_logo.png">
<h3>Clash of Clans Mod</h3>
<button class="download">تحميل</button>
</div>

</div>

</div>

</body>
</html>
